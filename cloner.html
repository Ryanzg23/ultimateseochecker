<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Cloner</title>
<link rel="stylesheet" href="style.css">
  <style>
.card {
  background: #262626;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  border: 1px solid #424242;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #424242;
  background: #161616;
  color: #fff;
}

button {
  margin-top: 10px;
  padding: 10px 16px;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  border: none;
  cursor: pointer;
}

.generate-btn {
  margin-top: 20px;
  width: 100%;
}
    
  </style>
</head>

<body>

<div class="container">

  <h1>Page Cloner + Replacer</h1>

<div class="card">
  <input type="text" id="url" placeholder="Enter URL..." />
</div>

  <div id="results" class="card" style="display:none;"></div>

  <div id="replaceSection" class="card">

    <h3>Replace Content</h3>

    <div class="grid">
      <div>
        <label>New Title</label>
        <input type="text" id="newTitle">
      </div>

      <div>
        <label>New Description</label>
        <input type="text" id="newDescription">
      </div>

      <div>
        <label>New Canonical</label>
        <input type="text" id="newCanonical">
      </div>

      <div>
        <label>New AMP URL</label>
        <input type="text" id="newAmp">
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
  <h3>Advanced Replace</h3>

  <div class="grid">
    <div>
      <label>Find Text</label>
      <input type="text" id="findText" placeholder="text to replace">
    </div>

    <div>
      <label>Replace With</label>
      <input type="text" id="replaceText" placeholder="new text">
    </div>
  </div>

  <hr style="margin:20px 0; border-color:#424242;">

  <h4>Asset Replace (Optional)</h4>

  <div class="grid">
    <div>
      <label>New Favicon URL</label>
      <input type="text" id="newFavicon">
    </div>

    <div>
      <label>New Logo URL</label>
      <input type="text" id="newLogo">
    </div>

    <div>
      <label>New Banner URL</label>
      <input type="text" id="newBanner">
    </div>
  </div>
</div>

    <button class="generate-btn" onclick="generate()">Generate HTML</button>
  </div>

</div>

<script src="cloner.js"></script>

</body>
</html>
